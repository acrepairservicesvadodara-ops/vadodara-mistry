<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)"/>
  
  <!-- House roof -->
  <path d="M256 80 L80 220 L120 220 L120 400 L392 400 L392 220 L432 220 Z" fill="url(#houseGrad)"/>
  
  <!-- Chimney -->
  <rect x="320" y="120" width="40" height="80" fill="#ffffff" rx="4"/>
  
  <!-- Door -->
  <rect x="216" y="280" width="80" height="120" fill="url(#bgGrad)" rx="8"/>
  <circle cx="280" cy="345" r="8" fill="#ffffff"/>
  
  <!-- Left window -->
  <rect x="120" y="260" width="60" height="60" fill="url(#bgGrad)" rx="6"/>
  <line x1="150" y1="260" x2="150" y2="320" stroke="#ffffff" stroke-width="4"/>
  <line x1="120" y1="290" x2="180" y2="290" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Right window -->
  <rect x="332" y="260" width="60" height="60" fill="url(#bgGrad)" rx="6"/>
  <line x1="362" y1="260" x2="362" y2="320" stroke="#ffffff" stroke-width="4"/>
  <line x1="332" y1="290" x2="392" y2="290" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Tools hint - wrench in corner -->
  <g transform="translate(380, 100) rotate(-30)">
    <rect x="0" y="0" width="12" height="50" fill="#ffffff" rx="2"/>
    <circle cx="6" cy="55" r="12" fill="none" stroke="#ffffff" stroke-width="6"/>
  </g>
</svg>
